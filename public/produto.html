<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Produto - TechVault</title>
  <link rel="icon" type="image/png" href="/images/favicon.png">
  <link rel="apple-touch-icon" href="/images/favicon.png">
  <link rel="stylesheet" href="/styles/main.css">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <style>
    :root {
      --primary: #1a73e8;
      --primary-light: #4285f4;
      --primary-dark: #1557b0;
      --primary-gradient: linear-gradient(135deg, #1a73e8 0%, #4285f4 100%);
      --secondary: #1e293b;
      --text: #1e293b;
      --text-light: #64748b;
      --text-muted: #94a3b8;
      --bg-light: #f8fafc;
      --bg-cool: #f1f5f9;
      --white: #ffffff;
      --success: #10b981;
      --border: #e2e8f0;
      --shadow: 0 1px 3px 0 rgba(0, 0, 0, 0.1), 0 1px 2px -1px rgba(0, 0, 0, 0.1);
      --shadow-md: 0 4px 6px -1px rgba(0, 0, 0, 0.1), 0 2px 4px -2px rgba(0, 0, 0, 0.1);
      --shadow-lg: 0 10px 15px -3px rgba(0, 0, 0, 0.1), 0 4px 6px -4px rgba(0, 0, 0, 0.1);
    }

    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: 'Inter', sans-serif;
      background: var(--bg-light);
      color: var(--text);
    }

    .header {
      background: var(--white);
      padding: 0;
      position: sticky;
      top: 0;
      z-index: 1000;
      box-shadow: var(--shadow-md);
      border-bottom: 1px solid var(--border);
    }

    .header-top {
      display: flex;
      align-items: center;
      gap: 24px;
      max-width: 1400px;
      margin: 0 auto;
      padding: 16px 24px;
    }

    .logo {
      text-decoration: none;
      display: flex;
      align-items: center;
    }

    .logo img {
      height: 40px;
      width: auto;
      object-fit: contain;
    }

    .search-box {
      flex: 1;
      display: flex;
      background: var(--bg-cool);
      border-radius: 12px;
      padding: 4px;
      border: 2px solid transparent;
      transition: all 0.3s ease;
    }

    .search-box:focus-within {
      background: var(--white);
      border-color: var(--primary);
      box-shadow: 0 0 0 4px rgba(26, 115, 232, 0.1);
    }

    .search-box input {
      flex: 1;
      border: none;
      outline: none;
      font-size: 15px;
      color: var(--text);
      background: transparent;
      padding: 10px 16px;
      font-family: inherit;
    }

    .search-box input::placeholder {
      color: var(--text-muted);
    }

    .search-box button {
      background: var(--primary-gradient);
      border: none;
      color: var(--white);
      cursor: pointer;
      padding: 10px 20px;
      border-radius: 8px;
      transition: all 0.3s ease;
      display: flex;
      align-items: center;
      gap: 8px;
      font-weight: 600;
    }

    .search-box button:hover {
      transform: translateY(-1px);
      box-shadow: var(--shadow-md);
    }

    .header-menu {
      display: flex;
      gap: 24px;
      align-items: center;
    }

    .header-menu a {
      color: var(--text-light);
      text-decoration: none;
      font-size: 14px;
      font-weight: 500;
      transition: all 0.2s;
    }

    .header-menu a:hover {
      color: var(--primary);
    }

    .cart-icon {
      position: relative;
      cursor: pointer;
      padding: 8px;
      border-radius: 8px;
      transition: all 0.2s;
    }

    .cart-icon:hover {
      background: var(--bg-cool);
    }

    .cart-count {
      position: absolute;
      top: 0;
      right: 0;
      background: var(--primary-gradient);
      color: var(--white);
      border-radius: 50%;
      min-width: 20px;
      height: 20px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 11px;
      font-weight: 700;
    }

    .main-content {
      max-width: 1400px;
      margin: 32px auto;
      padding: 0 24px;
    }

    .breadcrumb {
      margin-bottom: 24px;
      font-size: 14px;
      color: var(--text-light);
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .breadcrumb a {
      color: var(--primary);
      text-decoration: none;
      font-weight: 500;
      transition: color 0.2s;
    }

    .breadcrumb a:hover {
      color: var(--primary-dark);
    }

    .breadcrumb span {
      color: var(--text-muted);
    }

    .product-detail {
      background: var(--white);
      border-radius: 20px;
      padding: 40px;
      display: grid;
      grid-template-columns: 480px 1fr;
      gap: 48px;
      border: 1px solid var(--border);
      box-shadow: var(--shadow-lg);
    }

    .product-gallery {
      position: sticky;
      top: 100px;
    }

    .main-image {
      height: 480px;
      display: flex;
      align-items: center;
      justify-content: center;
      background: linear-gradient(135deg, #f8fafc 0%, #f1f5f9 100%);
      border-radius: 16px;
      margin-bottom: 20px;
      position: relative;
      overflow: hidden;
    }

    .main-image img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      transition: all 0.3s ease;
      position: relative;
      z-index: 1;
    }

    .product-gallery:hover .main-image img {
      transform: scale(1.05);
    }

    .thumbnails {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 12px;
    }

    .thumbnail {
      aspect-ratio: 1;
      background: var(--bg-cool);
      border-radius: 12px;
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      border: 2px solid transparent;
      transition: all 0.3s ease;
    }

    .thumbnail:hover {
      border-color: var(--primary);
      background: var(--white);
    }

    .thumbnail.active {
      border-color: var(--primary);
      background: var(--white);
    }

    .thumbnail i {
      font-size: 32px;
      color: var(--text-muted);
    }

    .product-info-section {
      padding: 8px 0;
    }

    .product-category {
      display: inline-block;
      background: linear-gradient(135deg, rgba(26, 115, 232, 0.1), rgba(66, 133, 244, 0.1));
      color: var(--primary);
      padding: 6px 14px;
      border-radius: 20px;
      font-size: 12px;
      font-weight: 600;
      margin-bottom: 16px;
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }

    .product-info-section h1 {
      font-size: 32px;
      font-weight: 800;
      margin-bottom: 16px;
      line-height: 1.3;
      letter-spacing: -0.5px;
      color: var(--text);
    }

    .product-rating-large {
      display: flex;
      align-items: center;
      gap: 12px;
      margin-bottom: 28px;
      padding-bottom: 24px;
      border-bottom: 1px solid var(--border-light);
    }

    .stars {
      color: #fbbf24;
      font-size: 18px;
      display: flex;
      gap: 2px;
    }

    .rating-text {
      color: var(--text-light);
      font-size: 14px;
      font-weight: 500;
    }

    .price-section {
      background: linear-gradient(135deg, #f8fafc 0%, #f1f5f9 100%);
      padding: 28px;
      border-radius: 16px;
      margin-bottom: 28px;
      border: 1px solid var(--border);
    }

    .old-price {
      text-decoration: line-through;
      color: var(--text-muted);
      font-size: 16px;
      margin-bottom: 8px;
    }

    .price {
      font-size: 42px;
      font-weight: 800;
      color: var(--text);
      letter-spacing: -1px;
      display: flex;
      align-items: baseline;
      gap: 8px;
    }

    .price-currency {
      font-size: 24px;
      font-weight: 700;
    }

    .price-installments {
      color: var(--text-light);
      font-size: 14px;
      margin-top: 8px;
      font-weight: 500;
    }

    .shipping-info {
      color: var(--success);
      font-size: 15px;
      font-weight: 600;
      margin: 20px 0;
      display: flex;
      align-items: center;
      gap: 10px;
      background: rgba(16, 185, 129, 0.1);
      padding: 12px 16px;
      border-radius: 10px;
      width: fit-content;
    }

    .stock-info {
      font-size: 14px;
      color: var(--success);
      font-weight: 600;
      margin: 16px 0;
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .stock-info i {
      font-size: 16px;
    }

    .action-buttons {
      display: flex;
      gap: 16px;
      margin-top: 28px;
    }

    .btn {
      padding: 16px 32px;
      border-radius: 12px;
      border: none;
      cursor: pointer;
      font-weight: 600;
      font-size: 15px;
      font-family: 'Inter', sans-serif;
      transition: all 0.3s ease;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
      flex: 1;
    }

    .btn-primary {
      background: var(--primary-gradient);
      color: var(--white);
      box-shadow: 0 4px 14px rgba(26, 115, 232, 0.4);
    }

    .btn-primary:hover {
      transform: translateY(-2px);
      box-shadow: 0 8px 20px rgba(26, 115, 232, 0.5);
    }

    .btn-success {
      background: linear-gradient(135deg, #10b981 0%, #34d399 100%);
      color: var(--white);
      box-shadow: 0 4px 14px rgba(16, 185, 129, 0.4);
    }

    .btn-success:hover {
      transform: translateY(-2px);
      box-shadow: 0 8px 20px rgba(16, 185, 129, 0.5);
    }

    .btn-outline {
      background: var(--white);
      color: var(--primary);
      border: 2px solid var(--primary);
    }

    .btn-outline:hover {
      background: var(--primary);
      color: var(--white);
    }

    .description-section {
      margin-top: 40px;
      padding-top: 40px;
      border-top: 1px solid var(--border);
    }

    .description-section h2 {
      font-size: 22px;
      font-weight: 700;
      margin-bottom: 20px;
      color: var(--text);
    }

    .description-section p {
      line-height: 1.8;
      color: var(--text-light);
      font-size: 15px;
    }

    .features-list {
      list-style: none;
      margin-top: 20px;
    }

    .features-list li {
      padding: 12px 0;
      padding-left: 32px;
      position: relative;
      color: var(--text-light);
      font-size: 15px;
    }

    .features-list li::before {
      content: '\f00c';
      font-family: 'Font Awesome 6 Free';
      font-weight: 900;
      position: absolute;
      left: 0;
      color: var(--success);
    }

    .loading {
      text-align: center;
      padding: 80px 20px;
      color: var(--text-light);
    }

    .loading i {
      font-size: 48px;
      animation: spin 1s linear infinite;
      color: var(--primary);
      margin-bottom: 16px;
    }

    @keyframes spin {
      from { transform: rotate(0deg); }
      to { transform: rotate(360deg); }
    }

    .comments-section {
      max-width: 1400px;
      margin: 48px auto 0;
      padding: 0 24px;
    }

    .comments-header {
      display: flex;
      align-items: center;
      gap: 12px;
      margin-bottom: 24px;
    }

    .comments-header h2 {
      font-size: 22px;
      font-weight: 700;
      color: var(--text);
    }

    .comments-header h2 i {
      color: var(--primary);
      margin-right: 8px;
    }

    .comments-count {
      background: var(--bg-cool);
      color: var(--text-light);
      padding: 4px 12px;
      border-radius: 20px;
      font-size: 13px;
      font-weight: 600;
    }

    .comment-form {
      background: var(--white);
      border: 1px solid var(--border);
      border-radius: 16px;
      padding: 24px;
      margin-bottom: 24px;
    }

    .comment-form-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 16px;
      flex-wrap: wrap;
      gap: 12px;
    }

    .rating-input {
      display: flex;
      align-items: center;
      gap: 12px;
    }

    .rating-label {
      font-size: 14px;
      font-weight: 600;
      color: var(--text);
    }

    .stars-input {
      display: flex;
      gap: 4px;
    }

    .stars-input i {
      font-size: 22px;
      color: var(--text-muted);
      cursor: pointer;
      transition: all 0.2s;
    }

    .stars-input i:hover,
    .stars-input i.active {
      color: #fbbf24;
    }

    .stars-input i.active ~ i {
      color: var(--text-muted);
    }

    .comment-form-auth {
      font-size: 13px;
      color: var(--text-muted);
    }

    .comment-form-auth a {
      color: var(--primary);
      text-decoration: none;
      font-weight: 600;
    }

    .comment-form-body textarea {
      width: 100%;
      min-height: 100px;
      padding: 14px;
      border: 1px solid var(--border);
      border-radius: 12px;
      font-family: 'Inter', sans-serif;
      font-size: 14px;
      color: var(--text);
      resize: vertical;
      transition: border-color 0.2s;
      outline: none;
      background: var(--bg-light);
    }

    .comment-form-body textarea:focus {
      border-color: var(--primary);
      box-shadow: 0 0 0 3px rgba(26, 115, 232, 0.1);
    }

    .comment-form-body textarea::placeholder {
      color: var(--text-muted);
    }

    .comment-form-footer {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-top: 12px;
    }

    .comment-char-count {
      font-size: 12px;
      color: var(--text-muted);
    }

    .comment-submit-btn {
      padding: 10px 24px;
      font-size: 14px;
      flex: none;
    }

    .comments-list {
      display: flex;
      flex-direction: column;
      gap: 16px;
    }

    .comments-loading {
      text-align: center;
      padding: 40px;
      color: var(--text-muted);
      font-size: 14px;
    }

    .comments-empty {
      text-align: center;
      padding: 60px 20px;
      color: var(--text-muted);
      background: var(--white);
      border-radius: 16px;
      border: 1px solid var(--border);
    }

    .comments-empty i {
      font-size: 48px;
      margin-bottom: 16px;
      opacity: 0.3;
    }

    .comments-empty h3 {
      font-size: 18px;
      font-weight: 600;
      color: var(--text-light);
      margin-bottom: 8px;
    }

    .comments-empty p {
      font-size: 14px;
    }

    .comment-card {
      background: var(--white);
      border: 1px solid var(--border);
      border-radius: 16px;
      padding: 20px 24px;
    }

    .comment-card-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 12px;
    }

    .comment-user {
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .comment-avatar {
      width: 36px;
      height: 36px;
      border-radius: 50%;
      background: var(--primary-gradient);
      color: var(--white);
      display: flex;
      align-items: center;
      justify-content: center;
      font-weight: 700;
      font-size: 14px;
    }

    .comment-user-info {
      display: flex;
      flex-direction: column;
    }

    .comment-user-name {
      font-size: 14px;
      font-weight: 600;
      color: var(--text);
    }

    .comment-date {
      font-size: 12px;
      color: var(--text-muted);
    }

    .comment-stars {
      color: #fbbf24;
      font-size: 14px;
      display: flex;
      gap: 2px;
    }

    .comment-text {
      font-size: 14px;
      line-height: 1.6;
      color: var(--text-light);
    }

    .comment-delete-btn {
      background: none;
      border: none;
      color: var(--text-muted);
      cursor: pointer;
      font-size: 14px;
      padding: 4px 8px;
      border-radius: 6px;
      transition: all 0.2s;
    }

    .comment-delete-btn:hover {
      background: rgba(239, 68, 68, 0.1);
      color: #ef4444;
    }

    .comment-rating-display {
      display: flex;
      align-items: center;
      gap: 6px;
    }

    .comment-rating-display .stars {
      font-size: 13px;
    }

    .comment-rating-display span {
      font-size: 13px;
      color: var(--text-light);
      font-weight: 500;
    }

    .related-section {
      max-width: 1400px;
      margin: 48px auto;
      padding: 0 24px;
    }

    .related-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 24px;
    }

    .related-header h2 {
      font-size: 24px;
      font-weight: 700;
      color: var(--text);
    }

    .related-see-all {
      color: var(--primary);
      text-decoration: none;
      font-weight: 600;
      font-size: 14px;
      display: flex;
      align-items: center;
      gap: 8px;
      transition: gap 0.2s;
    }

    .related-see-all:hover {
      gap: 12px;
    }

    .related-products {
      display: grid;
      grid-template-columns: repeat(5, 1fr);
      gap: 16px;
    }

    .related-product-card {
      background: var(--white);
      border-radius: 12px;
      overflow: hidden;
      border: 1px solid var(--border);
      cursor: pointer;
      transition: all 0.3s ease;
    }

    .related-product-card:hover {
      transform: translateY(-3px);
      box-shadow: var(--shadow-lg);
      border-color: transparent;
    }

    .related-product-image {
      height: 160px;
      display: flex;
      align-items: center;
      justify-content: center;
      background: linear-gradient(135deg, #f8fafc 0%, #f1f5f9 100%);
      overflow: hidden;
    }

    .related-product-image img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      transition: transform 0.3s ease;
    }

    .related-product-card:hover .related-product-image img {
      transform: scale(1.08);
    }

    .related-product-info {
      padding: 12px 14px;
    }

    .related-product-name {
      font-size: 13px;
      font-weight: 600;
      color: var(--text);
      margin-bottom: 6px;
      display: -webkit-box;
      -webkit-line-clamp: 2;
      -webkit-box-orient: vertical;
      overflow: hidden;
      line-height: 1.4;
    }

    .related-product-price {
      font-size: 18px;
      font-weight: 800;
      color: var(--text);
    }

    @media (max-width: 900px) {
      .product-detail {
        grid-template-columns: 1fr;
        padding: 24px;
      }

      .main-image {
        height: 360px;
      }

      .product-gallery {
        position: static;
      }

      .related-products {
        grid-template-columns: repeat(3, 1fr);
      }
    }

    @media (max-width: 768px) {
      .header-top {
        flex-wrap: wrap;
        gap: 16px;
        padding: 14px 16px;
      }

      .search-box {
        order: 3;
        flex-basis: 100%;
      }

      .price {
        font-size: 32px;
      }

      .action-buttons {
        flex-direction: column;
      }

      .related-products {
        grid-template-columns: repeat(2, 1fr);
      }
    }

    @media (max-width: 480px) {
      .related-products {
        grid-template-columns: 1fr;
      }
    }
  </style>
</head>
<body>
  <!-- Header -->
  <header class="header">
    <div class="header-top">
      <a href="/" class="logo">
        <img src="/images/logo.png" alt="TechVault" style="height: 40px; width: auto;">
      </a>
      
      <div class="search-box">
        <input type="text" id="searchInput" placeholder="Buscar produtos, marcas e muito mais...">
        <button onclick="searchProducts()">
          <i class="fas fa-search"></i>
        </button>
      </div>
      
      <div class="header-menu">
        <a href="/">Início</a>
        <div class="cart-icon" onclick="viewCart()">
          <i class="fas fa-shopping-cart" style="font-size: 22px; color: var(--primary);"></i>
          <span class="cart-count" id="cartCount">0</span>
        </div>
      </div>
    </div>
  </header>

  <!-- Main Content -->
  <main class="main-content">
    <div class="breadcrumb" id="breadcrumb">
      <a href="/"><i class="fas fa-home"></i> Início</a>
      <i class="fas fa-chevron-right" style="font-size: 10px;"></i>
      <span id="breadcrumbCategory">Produto</span>
    </div>

    <div id="productContent">
      <div class="loading">
        <i class="fas fa-spinner"></i>
        <p>Carregando produto...</p>
      </div>
    </div>
  </main>

  <section class="comments-section" id="commentsSection">
    <div class="comments-header">
      <h2><i class="fas fa-comments"></i> Comentários</h2>
      <span class="comments-count" id="commentsCount">0</span>
    </div>

    <div class="comment-form" id="commentForm">
      <div class="comment-form-header">
        <div class="rating-input">
          <span class="rating-label">Sua avaliação:</span>
          <div class="stars-input" id="starsInput">
            <i class="far fa-star" data-star="1"></i>
            <i class="far fa-star" data-star="2"></i>
            <i class="far fa-star" data-star="3"></i>
            <i class="far fa-star" data-star="4"></i>
            <i class="far fa-star" data-star="5"></i>
          </div>
        </div>
        <span class="comment-form-auth" id="commentAuth"></span>
      </div>
      <div class="comment-form-body">
        <textarea id="commentText" placeholder="Escreva seu comentário sobre este produto..." maxlength="500"></textarea>
        <div class="comment-form-footer">
          <span class="comment-char-count" id="charCount">0/500</span>
          <button class="btn btn-primary comment-submit-btn" onclick="submitComment()">
            <i class="fas fa-paper-plane"></i> Enviar
          </button>
        </div>
