<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Checkout - TechVault</title>
  <link rel="stylesheet" href="/styles/main.css">
  <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Roboto:wght@300;400;500;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>
  <!-- Header -->
  <header class="header">
    <div class="container">
      <div class="logo">
        <i class="fas fa-vault"></i>
        <span>TechVault</span>
      </div>
      <nav class="nav">
        <a href="/" class="nav-link">Início</a>
      </nav>
    </div>
  </header>

  <main class="checkout-page">
    <div class="container">
      <h1>Finalizar Compra</h1>
      
      <div class="checkout-grid">
        <!-- Formulário de Endereço -->
        <div class="checkout-section">
          <h2><i class="fas fa-map-marker-alt"></i> Endereço de Entrega</h2>
          <form id="checkoutForm" onsubmit="handleCheckout(event)">
            <div class="form-row">
              <div class="form-group">
                <label for="cep">CEP *</label>
                <input type="text" id="cep" name="cep" required placeholder="00000-000" maxlength="9" onblur="buscarCEP()">
              </div>
              <div class="form-group">
                <label for="cidade">Cidade *</label>
                <input type="text" id="cidade" name="cidade" required readonly>
              </div>
            </div>
            
            <div class="form-row">
              <div class="form-group">
                <label for="estado">Estado *</label>
                <input type="text" id="estado" name="estado" required readonly>
              </div>
              <div class="form-group">
                <label for="bairro">Bairro *</label>
                <input type="text" id="bairro" name="bairro" required>
              </div>
            </div>
            
            <div class="form-group">
              <label for="logradouro">Logradouro *</label>
              <input type="text" id="logradouro" name="logradouro" required placeholder="Rua, Avenida, etc.">
            </div>
            
            <div class="form-row">
              <div class="form-group">
                <label for="numero">Número *</label>
                <input type="text" id="numero" name="numero" required placeholder="123">
              </div>
              <div class="form-group">
                <label for="complemento">Complemento</label>
                <input type="text" id="complemento" name="complemento" placeholder="Apto, bloco, etc.">
              </div>
            </div>
            
            <div class="form-group">
              <label for="nomeCompleto">Nome Completo *</label>
              <input type="text" id="nomeCompleto" name="nomeCompleto" required placeholder="Seu nome completo">
            </div>
            
            <div class="form-group">
              <label for="telefone">Telefone *</label>
              <input type="tel" id="telefone" name="telefone" required placeholder="(00) 00000-0000">
            </div>
            
            <div class="order-summary">
              <h3><i class="fas fa-shopping-cart"></i> Resumo do Pedido</h3>
              <div id="cartItems">
                <!-- Itens do carrinho serão carregados aqui -->
              </div>
              <div class="order-total">
                <span>Total:</span>
                <span class="total-value" id="orderTotal">R$ 0,00</span>
              </div>
            </div>
            
            <button type="submit" class="btn btn-primary btn-large btn-block">
              <i class="fas fa-check-circle"></i> Finalizar Pedido
            </button>
          </form>
        </div>
      </div>
      
      <div id="errorMessage" class="error-message" style="display: none;"></div>
      <div id="successMessage" class="success-message" style="display: none;"></div>
    </div>
  </main>

  <footer class="footer">
    <div class="container">
      <div class="footer-bottom">
        <p>&copy; 2026 TechVault. Todos os direitos reservados.</p>
        <p>Email: akilajonas001@gmail.com</p>
      </div>
    </div>
  </footer>

  <script src="/js/main.js"></script>
  <script src="/js/checkout.js"></script>
</body>
</html>
