<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Login - TechVault</title>
  <link rel="icon" type="image/png" href="/images/favicon.png">
  <link rel="apple-touch-icon" href="/images/favicon.png">
  <link rel="stylesheet" href="/styles/main.css">
  <link rel="stylesheet" href="/styles/mobile.css">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <style>
    :root {
      --primary: #1a73e8;
      --primary-light: #4285f4;
      --primary-gradient: linear-gradient(135deg, #1a73e8 0%, #4285f4 100%);
      --secondary: #1e293b;
      --text: #1e293b;
      --text-light: #64748b;
      --text-muted: #94a3b8;
      --bg-light: #f8fafc;
      --bg-cool: #f1f5f9;
      --white: #ffffff;
      --border: #e2e8f0;
      --success: #10b981;
      --error: #ef4444;
    }

    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: 'Inter', sans-serif;
      background: var(--bg-light);
      color: var(--text);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px;
    }

    .auth-container {
      width: 100%;
      max-width: 440px;
    }

    .auth-card {
      background: var(--white);
      border-radius: 20px;
      padding: 48px 40px;
      box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.15);
      border: 1px solid var(--border);
    }

    .auth-logo {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 12px;
      margin-bottom: 32px;
    }

    .auth-logo i {
      font-size: 42px;
      background: var(--primary-gradient);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }

    .auth-logo span {
      font-size: 28px;
      font-weight: 800;
      background: var(--primary-gradient);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }

    h1 {
      font-size: 28px;
      font-weight: 700;
      color: var(--text);
      margin-bottom: 8px;
      text-align: center;
      letter-spacing: -0.5px;
    }

    .auth-subtitle {
      color: var(--text-light);
      font-size: 15px;
      text-align: center;
      margin-bottom: 32px;
    }

    .form-group {
      margin-bottom: 20px;
    }

    .form-group label {
      display: block;
      font-size: 14px;
      font-weight: 600;
      color: var(--text);
      margin-bottom: 8px;
    }

    .form-group input {
      width: 100%;
      padding: 14px 18px;
      border: 2px solid var(--border);
      border-radius: 12px;
      font-size: 15px;
      font-family: 'Inter', sans-serif;
      color: var(--text);
      background: var(--white);
      transition: all 0.3s ease;
    }

    .form-group input:focus {
      outline: none;
      border-color: var(--primary);
      box-shadow: 0 0 0 4px rgba(26, 115, 232, 0.1);
    }

    .form-group input::placeholder {
      color: var(--text-muted);
    }

    .btn {
      padding: 14px 24px;
      border-radius: 12px;
      border: none;
      cursor: pointer;
      font-weight: 600;
      font-size: 15px;
      font-family: 'Inter', sans-serif;
      transition: all 0.3s ease;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
      width: 100%;
    }

    .btn-primary {
      background: var(--primary-gradient);
      color: var(--white);
      box-shadow: 0 4px 14px rgba(26, 115, 232, 0.4);
    }

    .btn-primary:hover {
      transform: translateY(-2px);
      box-shadow: 0 8px 20px rgba(26, 115, 232, 0.5);
    }

    .divider {
      display: flex;
      align-items: center;
      margin: 28px 0;
      color: var(--text-muted);
      font-size: 13px;
    }

    .divider::before,
    .divider::after {
      content: '';
      flex: 1;
      height: 1px;
      background: var(--border);
    }

    .divider span {
      padding: 0 16px;
    }

    .auth-footer {
      text-align: center;
      font-size: 14px;
      color: var(--text-light);
      margin-top: 24px;
    }

    .auth-footer a {
      color: var(--primary);
      text-decoration: none;
      font-weight: 600;
      transition: color 0.2s;
    }

    .auth-footer a:hover {
      color: var(--primary-dark);
      text-decoration: underline;
    }

    .error-message {
      background: linear-gradient(135deg, rgba(239, 68, 68, 0.1), rgba(248, 113, 113, 0.1));
      color: var(--error);
      padding: 14px 18px;
      border-radius: 12px;
      margin-top: 20px;
      font-size: 14px;
      display: flex;
      align-items: center;
      gap: 10px;
      border: 1px solid rgba(239, 68, 68, 0.2);
    }

    .back-home {
      position: fixed;
      top: 24px;
      left: 24px;
      display: flex;
      align-items: center;
      gap: 8px;
      color: var(--text-light);
      text-decoration: none;
      font-size: 14px;
      font-weight: 500;
      transition: all 0.2s;
      padding: 10px 16px;
      border-radius: 10px;
      background: var(--white);
      border: 1px solid var(--border);
    }

    .back-home:hover {
      color: var(--primary);
      border-color: var(--primary);
      transform: translateX(-4px);
    }

    @media (max-width: 480px) {
      .auth-card {
        padding: 36px 28px;
      }

      .back-home {
        display: none;
      }
    }
  </style>
</head>
<body>
  <a href="/" class="back-home">
    <i class="fas fa-arrow-left"></i>
    Voltar para loja
  </a>

  <div class="auth-container">
    <div class="auth-card">
      <div class="auth-logo">
        <i class="fas fa-cube"></i>
        <span>TechVault</span>
      </div>
      
      <h1>Bem-vindo de volta!</h1>
      <p class="auth-subtitle">Acesse sua conta para continuar</p>
      
      <form id="loginForm" onsubmit="handleLogin(event)">
        <div class="form-group">
          <label for="email">Email</label>
          <input type="email" id="email" name="email" required placeholder="seu@email.com">
        </div>
        
        <div class="form-group">
          <label for="senha">Senha</label>
          <input type="password" id="senha" name="senha" required placeholder="Sua senha">
        </div>
        
        <button type="submit" class="btn btn-primary">
          <i class="fas fa-sign-in-alt"></i>
          Entrar
        </button>
      </form>
      
      <div class="divider">
        <span>ou</span>
      </div>
      
      <p style="font-size:13px;color:var(--text-muted);text-align:center;margin-bottom:8px;">Entrar com Google (apenas contas existentes)</p>
      <div id="googleButton"></div>
      
      <p class="auth-footer">
        Não tem uma conta? <a href="/registro">Registre-se grátis</a>
      </p>
      
      <p class="auth-footer">
        <a href="/">Voltar para a loja</a>
      </p>
      
      <div id="errorMessage" class="error-message" style="display: none;"></div>
    </div>
  </div>

  <script src="https://accounts.google.com/gsi/client" async defer></script>
  <script src="/js/main.js?v=4"></script>
  <script src="/js/auth.js?v=3"></script>
  <script>
    fetch('/api/config')
      .then(r => r.json())
      .then(config => {
        if (!config.googleClientId) return;
        (function waitForGoogle() {
          if (typeof google !== 'undefined' && google.accounts) {
            renderGoogleButton(config.googleClientId);
          } else {
            setTimeout(waitForGoogle, 200);
          }
        })();
      });
  </script>
</body>
</html>
