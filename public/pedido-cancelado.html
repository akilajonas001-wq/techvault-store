<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Pagamento Cancelado - TechVault</title>
  <link rel="icon" type="image/png" href="/images/favicon.png">
  <link rel="stylesheet" href="/styles/main.css">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: 'Inter', sans-serif; background: #f8fafc; color: #1e293b; min-height: 100vh; display: flex; flex-direction: column; align-items: center; justify-content: center; }
    .card { background: white; border-radius: 24px; padding: 48px; text-align: center; max-width: 480px; width: 90%; box-shadow: 0 4px 6px -1px rgba(0,0,0,0.1); }
    .icon { font-size: 64px; color: #f59e0b; margin-bottom: 16px; }
    h1 { font-size: 28px; font-weight: 800; margin-bottom: 8px; }
    p { color: #64748b; font-size: 15px; line-height: 1.6; margin-bottom: 24px; }
    .btn { display: inline-flex; align-items: center; gap: 8px; padding: 14px 32px; border-radius: 12px; text-decoration: none; font-weight: 600; font-size: 15px; background: linear-gradient(135deg, #1a73e8 0%, #4285f4 100%); color: white; transition: all 0.3s; margin: 0 8px; }
    .btn-secondary { background: #f1f5f9; color: #1e293b; }
    .btn:hover { transform: translateY(-2px); }
  </style>
</head>
<body>
  <div class="card">
    <div class="icon"><i class="fas fa-exclamation-circle"></i></div>
    <h1>Pagamento não finalizado</h1>
    <p>O pagamento foi cancelado ou não foi concluído. Seu pedido foi mantido em nosso sistema.</p>
    <div>
      <a href="/checkout" class="btn"><i class="fas fa-redo"></i> Tentar novamente</a>
      <a href="/" class="btn btn-secondary"><i class="fas fa-home"></i> Continuar comprando</a>
    </div>
  </div>
</body>
</html>
