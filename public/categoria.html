<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Categoria - TechVault</title>
  <link rel="icon" type="image/png" href="/images/favicon.png">
  <link rel="apple-touch-icon" href="/images/favicon.png">
  <link rel="stylesheet" href="/styles/main.css">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <style>
    :root {
      --primary: #1a73e8;
      --primary-light: #4285f4;
      --primary-dark: #1557b0;
      --primary-gradient: linear-gradient(135deg, #1a73e8 0%, #4285f4 100%);
      --secondary: #1e293b;
      --text: #1e293b;
      --text-light: #64748b;
      --text-muted: #94a3b8;
      --bg-light: #f8fafc;
      --bg-cool: #f1f5f9;
      --white: #ffffff;
      --success: #10b981;
      --border: #e2e8f0;
      --shadow: 0 1px 3px 0 rgba(0, 0, 0, 0.1);
      --shadow-md: 0 4px 6px -1px rgba(0, 0, 0, 0.1);
      --shadow-lg: 0 10px 15px -3px rgba(0, 0, 0, 0.1);
    }

    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: 'Inter', sans-serif;
      background: var(--bg-light);
      color: var(--text);
    }

    .header {
      background: var(--white);
      padding: 0;
      position: sticky;
      top: 0;
      z-index: 1000;
      box-shadow: var(--shadow-md);
      border-bottom: 1px solid var(--border);
    }

    .container {
      max-width: 1400px;
      margin: 0 auto;
      padding: 0 24px;
    }

    .header .container {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 16px 24px;
      gap: 24px;
    }

    .logo {
      display: flex;
      align-items: center;
      text-decoration: none;
      transition: opacity 0.2s;
    }

    .logo:hover {
      opacity: 0.8;
    }

    .logo img {
      height: 40px;
      width: auto;
      object-fit: contain;
    }

    .nav {
      display: flex;
      gap: 20px;
      align-items: center;
      flex: 1;
      overflow-x: auto;
    }

    .nav::-webkit-scrollbar {
      height: 4px;
    }

    .nav::-webkit-scrollbar-thumb {
      background: var(--border);
      border-radius: 2px;
    }

    .nav-link {
      color: var(--text-light);
      text-decoration: none;
      font-size: 14px;
      font-weight: 500;
      white-space: nowrap;
      transition: color 0.2s;
    }

    .nav-link:hover {
      color: var(--primary);
    }

    .user-actions {
      display: flex;
      align-items: center;
      gap: 16px;
    }

    .cart-icon {
      position: relative;
      cursor: pointer;
      padding: 8px;
      border-radius: 8px;
      transition: all 0.2s;
    }

    .cart-icon:hover {
      background: var(--bg-cool);
    }

    .cart-icon i {
      font-size: 22px;
      color: var(--primary);
    }

    .cart-count {
      position: absolute;
      top: 0;
      right: 0;
      background: var(--primary-gradient);
      color: var(--white);
      border-radius: 50%;
      min-width: 20px;
      height: 20px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 11px;
      font-weight: 700;
    }

    .btn {
      padding: 10px 20px;
      border-radius: 10px;
      border: none;
      cursor: pointer;
      font-weight: 600;
      font-size: 14px;
      font-family: 'Inter', sans-serif;
      transition: all 0.3s ease;
    }

    .btn-primary {
      background: var(--primary-gradient);
      color: var(--white);
      box-shadow: 0 4px 14px rgba(26, 115, 232, 0.3);
    }

    .btn-primary:hover {
      transform: translateY(-2px);
      box-shadow: 0 8px 20px rgba(26, 115, 232, 0.4);
    }

    .btn-outline {
      background: var(--white);
      color: var(--primary);
      border: 2px solid var(--primary);
    }

    .btn-outline:hover {
      background: var(--primary);
      color: var(--white);
    }

    .user-name {
      font-size: 14px;
      font-weight: 500;
      color: var(--text);
    }

    /* Category Page */
    .category-page {
      padding: 48px 0;
    }

    .category-header {
      background: var(--white);
      border-radius: 20px;
      padding: 48px;
      margin-bottom: 32px;
      border: 1px solid var(--border);
      box-shadow: var(--shadow-md);
      text-align: center;
    }

    .category-header h1 {
      font-size: 36px;
      font-weight: 800;
      color: var(--text);
      margin-bottom: 12px;
      letter-spacing: -0.5px;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 16px;
    }

    .category-header h1 i {
      color: var(--primary);
      font-size: 42px;
    }

    .category-header p {
      color: var(--text-light);
      font-size: 16px;
      max-width: 600px;
      margin: 0 auto;
    }

    .products-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(260px, 1fr));
      gap: 20px;
    }

    .product-card {
      background: var(--white);
      border-radius: 16px;
      overflow: hidden;
      border: 1px solid var(--border);
      transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
      cursor: pointer;
    }

    .product-card:hover {
      transform: translateY(-4px);
      box-shadow: var(--shadow-lg);
      border-color: transparent;
    }

    .product-image {
      height: 220px;
      display: flex;
      align-items: center;
      justify-content: center;
      background: linear-gradient(135deg, #f8fafc 0%, #f1f5f9 100%);
      padding: 24px;
      position: relative;
      overflow: hidden;
    }

    .product-image img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      transition: all 0.3s ease;
      position: relative;
      z-index: 1;
    }

    .product-card:hover .product-image img {
      transform: scale(1.08);
    }

    .product-info {
      padding: 20px;
    }

    .product-price {
      font-size: 26px;
      font-weight: 800;
      color: var(--text);
      margin-bottom: 8px;
      letter-spacing: -0.5px;
    }

    .product-shipping {
      color: var(--success);
      font-size: 12px;
      font-weight: 600;
      margin-bottom: 12px;
      display: flex;
      align-items: center;
      gap: 6px;
      background: rgba(16, 185, 129, 0.1);
      padding: 6px 10px;
      border-radius: 6px;
      width: fit-content;
    }

    .product-name {
      font-size: 14px;
      color: var(--text-light);
      line-height: 1.5;
      margin-bottom: 10px;
      display: -webkit-box;
      -webkit-line-clamp: 2;
      -webkit-box-orient: vertical;
      overflow: hidden;
      min-height: 42px;
    }

    .product-rating {
      display: flex;
      align-items: center;
      gap: 6px;
      font-size: 13px;
      color: var(--text-light);
      font-weight: 500;
    }

    .product-rating i {
      color: #fbbf24;
      font-size: 14px;
    }

    .no-products {
      text-align: center;
      padding: 80px 20px;
      background: var(--white);
      border-radius: 16px;
      border: 1px solid var(--border);
    }

    .no-products i {
      font-size: 80px;
      color: var(--text-muted);
      margin-bottom: 20px;
    }

    .no-products h3 {
      font-size: 20px;
      font-weight: 700;
      color: var(--text);
      margin-bottom: 8px;
    }

    .no-products p {
      color: var(--text-light);
    }

    .pagination {
      display: flex;
      justify-content: center;
      align-items: center;
      gap: 6px;
      margin: 40px 0;
    }

    .page-btn {
      min-width: 40px;
      height: 40px;
      border-radius: 10px;
      border: 1px solid var(--border);
      background: var(--white);
      color: var(--text-light);
      cursor: pointer;
      font-size: 14px;
      font-weight: 600;
      font-family: 'Inter', sans-serif;
      transition: all 0.2s;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .page-btn:hover:not(:disabled) {
      border-color: var(--primary);
      color: var(--primary);
      background: rgba(26,115,232,0.05);
    }

    .page-btn.active {
      background: var(--primary-gradient);
      color: var(--white);
      border-color: transparent;
      box-shadow: 0 4px 10px rgba(26,115,232,0.3);
    }

    .page-btn:disabled {
      opacity: 0.3;
      cursor: not-allowed;
    }

    .page-dots {
      padding: 0 4px;
      color: var(--text-muted);
      font-size: 14px;
    }

    .footer {
      background: var(--white);
      border-top: 1px solid var(--border);
      padding: 40px 0;
      margin-top: 60px;
    }

    .footer-bottom {
      text-align: center;
      color: var(--text-muted);
      font-size: 14px;
    }

    .loading {
      text-align: center;
      padding: 60px 20px;
    }

    .loading i {
      font-size: 48px;
      color: var(--primary);
      animation: spin 1s linear infinite;
    }

    @keyframes spin {
      to {
        transform: rotate(360deg);
      }
    }

    @media (max-width: 768px) {
      .header .container {
        flex-wrap: wrap;
        gap: 16px;
        padding: 14px 16px;
      }

      .nav {
        order: 3;
        width: 100%;
        padding: 8px 0;
      }

      .category-header {
        padding: 32px 20px;
      }

      .category-header h1 {
        font-size: 28px;
        flex-direction: column;
        gap: 8px;
      }

      .category-header h1 i {
        font-size: 36px;
      }

      .products-grid {
        grid-template-columns: repeat(auto-fill, minmax(160px, 1fr));
        gap: 12px;
      }
    }
  </style>
</head>
<body>
  <!-- Header -->
  <header class="header">
    <div class="container">
      <a href="/" class="logo">
        <img src="/images/logo.png" alt="TechVault" style="height: 40px; width: auto;">
      </a>
      
      <nav class="nav">
        <a href="/" class="nav-link">Início</a>
        <a href="/categoria/celulares-e-smartphones" class="nav-link">Celulares</a>
        <a href="/categoria/informatica" class="nav-link">Informática</a>
        <a href="/categoria/moda-e-vestuario" class="nav-link">Moda</a>
        <a href="/categoria/esportes-e-fitness" class="nav-link">Esportes</a>
        <a href="/categoria/casa-e-decoracao" class="nav-link">Casa</a>
        <a href="/categoria/eletronicos" class="nav-link">Eletrônicos</a>
        <a href="/categoria/games" class="nav-link">Games</a>
        <a href="/categoria/eletrodomesticos" class="nav-link">Eletrodomésticos</a>
        <a href="/categoria/beleza-e-perfumaria" class="nav-link">Beleza</a>
        <a href="/categoria/moveis" class="nav-link">Móveis</a>
      </nav>
      
      <div class="user-actions">
        <div class="cart-icon" onclick="viewCart()">
          <i class="fas fa-shopping-cart"></i>
          <span class="cart-count" id="cartCount">0</span>
        </div>
        <div id="authButtons">
          <button class="btn btn-outline" onclick="window.location.href='/login'">Login</button>
          <button class="btn btn-primary" onclick="window.location.href='/registro'">Registrar</button>
        </div>
        <div id="userMenu" style="display: none;">
          <span class="user-name" id="userName"></span>
          <button class="btn btn-outline" onclick="logout()">Sair</button>
        </div>
      </div>
    </div>
  </header>

  <main class="category-page">
    <div class="container">
      <div class="category-header">
        <h1 id="categoryTitle">
          <i class="fas fa-tag"></i>
          Categoria
        </h1>
        <p>Explore os melhores produtos desta categoria com preços imperdíveis</p>
      </div>
      
      <div class="products-grid" id="categoryProducts">
        <div class="loading">
          <i class="fas fa-spinner"></i>
          <p style="margin-top: 16px; color: var(--text-light);">Carregando produtos...</p>
        </div>
      </div>

      <div id="pagination"></div>
    </div>
  </main>

  <footer class="footer">
    <div class="container">
      <div class="footer-bottom">
        <p>&copy; 2026 TechVault. Todos os direitos reservados.</p>
      </div>
    </div>
  </footer>

  <script src="/js/main.js"></script>
  <script src="/js/category.js"></script>
</body>
</html>
