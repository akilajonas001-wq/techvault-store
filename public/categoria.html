<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Categoria - TechVault</title>
  <link rel="stylesheet" href="/styles/main.css">
  <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Roboto:wght@300;400;500;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>
  <!-- Header -->
  <header class="header">
    <div class="container">
      <div class="logo">
        <i class="fas fa-vault"></i>
        <span>TechVault</span>
      </div>
      
      <nav class="nav">
        <a href="/" class="nav-link">Início</a>
        <a href="/categoria/processadores" class="nav-link">Processadores</a>
        <a href="/categoria/ram" class="nav-link">RAM</a>
        <a href="/categoria/ssds" class="nav-link">SSDs</a>
        <a href="/categoria/hds" class="nav-link">HDs</a>
        <a href="/categoria/monitores" class="nav-link">Monitores</a>
        <a href="/categoria/gabinetes" class="nav-link">Gabinetes</a>
        <a href="/categoria/pcs-premontados" class="nav-link">PCs Premontados</a>
        <a href="/categoria/acessorios" class="nav-link">Acessórios</a>
        <a href="/categoria/utilitarios" class="nav-link">Utilitários</a>
      </nav>
      
      <div class="user-actions">
        <div class="cart-icon" onclick="viewCart()">
          <i class="fas fa-shopping-cart"></i>
          <span class="cart-count" id="cartCount">0</span>
        </div>
        <div id="authButtons">
          <button class="btn btn-outline" onclick="window.location.href='/login'">Login</button>
          <button class="btn btn-primary" onclick="window.location.href='/registro'">Registrar</button>
        </div>
        <div id="userMenu" style="display: none;">
          <span class="user-name" id="userName"></span>
          <button class="btn btn-outline" onclick="logout()">Sair</button>
        </div>
      </div>
    </div>
  </header>

  <main class="category-page">
    <div class="container">
      <h1 id="categoryTitle">Categoria</h1>
      <div class="products-grid" id="categoryProducts">
        <!-- Produtos serão carregados via JavaScript -->
      </div>
    </div>
  </main>

  <footer class="footer">
    <div class="container">
      <div class="footer-bottom">
        <p>&copy; 2026 TechVault. Todos os direitos reservados.</p>
      </div>
    </div>
  </footer>

  <script src="/js/main.js"></script>
  <script src="/js/category.js"></script>
</body>
</html>
