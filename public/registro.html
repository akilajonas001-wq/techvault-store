<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Registro - TechVault</title>
  <link rel="stylesheet" href="/styles/main.css">
  <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Roboto:wght@300;400;500;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body class="auth-page">
  <div class="auth-container">
    <div class="auth-card">
      <div class="auth-logo">
        <i class="fas fa-vault"></i>
        <span>TechVault</span>
      </div>
      
      <h1>Criar Conta</h1>
      <p class="auth-subtitle">Registre-se para comprar na TechVault</p>
      
      <form id="registroForm" onsubmit="handleRegistro(event)">
        <div class="form-group">
          <label for="nome">Nome Completo</label>
          <input type="text" id="nome" name="nome" required placeholder="Seu nome completo">
        </div>
        
        <div class="form-group">
          <label for="email">Email</label>
          <input type="email" id="email" name="email" required placeholder="seu@email.com">
        </div>
        
        <div class="form-group">
          <label for="telefone">Telefone</label>
          <input type="tel" id="telefone" name="telefone" placeholder="(00) 00000-0000">
        </div>
        
        <div class="form-group">
          <label for="senha">Senha</label>
          <input type="password" id="senha" name="senha" required placeholder="Mínimo 6 caracteres" minlength="6">
        </div>
        
        <div class="form-group">
          <label for="confirmarSenha">Confirmar Senha</label>
          <input type="password" id="confirmarSenha" name="confirmarSenha" required placeholder="Confirme sua senha">
        </div>
        
        <button type="submit" class="btn btn-primary btn-block">Criar Conta</button>
      </form>
      
      <div class="divider">
        <span>ou</span>
      </div>
      
      <button class="btn btn-google" onclick="loginWithGoogle()">
        <i class="fab fa-google"></i>
        Registrar com Google
      </button>
      
      <p class="auth-footer">
        Já tem uma conta? <a href="/login">Faça login</a>
      </p>
      
      <p class="auth-footer">
        <a href="/">Voltar para a loja</a>
      </p>
      
      <div id="errorMessage" class="error-message" style="display: none;"></div>
    </div>
  </div>

  <script src="/js/main.js"></script>
  <script src="/js/auth.js"></script>
</body>
</html>
